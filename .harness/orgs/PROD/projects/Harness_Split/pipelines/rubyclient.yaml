pipeline:
  name: ruby-client
  identifier: rubyclient
  projectIdentifier: Harness_Split
  orgIdentifier: PROD
  tags:
    ai_generated: "true"
  properties:
    ci:
      codebase:
        connectorRef: fmegithubharnessgitops
        repoName: ruby-client
        build: <+input>
  stages:
    - stage:
        name: Build and Test
        identifier: build_and_test
        type: CI
        spec:
          cloneCodebase: true
          caching:
            enabled: true
            override: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec:
              nestedVirtualization: true
          execution:
            steps:
              - step:
                  type: Run
                  name: Setup Ruby
                  identifier: setup_ruby
                  spec:
                    connectorRef: account.harnessImage
                    image: alpine
                    shell: Bash
                    command: |
                      # Install Ruby 3.1
                      apk add --update ruby=3.1.* ruby-dev build-base

                      # Verify Ruby installation
                      ruby --version

                      # Export Ruby version for other steps
                      export RUBY_VERSION=$(ruby -v | awk '{print $2}')
                    outputVariables:
                      - name: RUBY_VERSION
                  timeout: 10m
              - step:
                  type: Run
                  name: Bundle Install
                  identifier: bundle_install
                  spec:
                    connectorRef: account.harnessImage
                    image: alpine
                    shell: Bash
                    command: |
                      # Install dependencies using Bundle
                      bundle install

                      # Export status for tracking
                      if [ $? -eq 0 ]; then
                        export BUNDLE_INSTALL_STATUS="success"
                      else
                        export BUNDLE_INSTALL_STATUS="failed"
                      fi
                    outputVariables:
                      - name: BUNDLE_INSTALL_STATUS
                  timeout: 10m
              - step:
                  identifier: run_tests
                  name: Run tests with RSpec
                  type: RunTests
                  timeout: 10m
                  spec:
                    language: Ruby
                    buildTool: Rspec
                    reports:
                      type: JUnit
                      spec:
                        paths:
                          - spec/reports/*.xml
              - step:
                  type: Run
                  name: Run RuboCop
                  identifier: run_rubocop
                  spec:
                    connectorRef: account.harnessImage
                    image: alpine
                    shell: Bash
                    command: |
                      bundle exec rubocop
                    envVariables:
                      RUBOCOP_OPTS: "--format progress --format json --out rubocop.json"
                    outputVariables:
                      - name: RUBOCOP_RESULT
                  timeout: 10m
              - step:
                  identifier: run_brakeman
                  name: Run Brakeman
                  type: Brakeman
                  timeout: 10m
                  spec:
                    config: default
                    mode: orchestration
                    target:
                      type: repository
                      detection: auto
                    advanced:
                      fail_on_severity: high
            rollbackSteps: []
  description: This pipeline was generated by Harness AI on 2026-02-05 18:40:52 UTC by Bilal Al-Shahwany.
